{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "demo-app.fullname" . }}
  labels:
    {{- include "demo-app.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "demo-app.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Permitir tráfico sólo desde el ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.ingressFromNamespace }}
      ports:
        - protocol: TCP
          port: {{ .Values.containerPort }}
  egress:
    # Permitir DNS (necesario para cualquier resolución de nombres)
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Permitir HTTPS saliente (para llamadas a APIs externas si se necesita en el futuro)
    - ports:
        - protocol: TCP
          port: 443
{{- end }}
