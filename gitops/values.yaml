# ==============================================================
# gitops/values.yaml — Overrides de producción para ArgoCD
#
# IMPORTANTE: Este archivo es actualizado AUTOMÁTICAMENTE por
# el pipeline (triggerci.yml → job update-gitops).
# NO editar manualmente el campo image.tag.
#
# Jerarquía (mayor prioridad gana):
#   gitops/values.yaml  ← este archivo (ArgoCD override)
#   helm/demo-app/values.yaml ← defaults del chart
# ==============================================================

image:
  repository: "docker.io/nahumtestaccount/demo-app"
  tag: "9c5b1622e94f"
  pullPolicy: Always           # Always garantiza imagen correcta con tags mutables

replicaCount: 1

service:
  type: ClusterIP
  port: 3000

containerPort: 3000

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi

livenessProbe:
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  path: /health
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

startupProbe:
  path: /health
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 12

serviceAccount:
  create: true
  name: ""
  automountServiceAccountToken: false
  annotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

networkPolicy:
  enabled: true
  ingressFromNamespace: "ingress-nginx"

podDisruptionBudget:
  enabled: true
  minAvailable: 1

podAnnotations:
  fluentbit.io/parser: "json"
  prometheus.io/scrape: "false"
  prometheus.io/port: "3000"
