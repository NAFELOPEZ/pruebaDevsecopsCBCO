# ==============================================================
# triggerci.yml — Pipeline de CI + Build + Push + GitOps
#
# FLUJO COMPLETO:
#   validate-pr-approval  (sólo en eventos de PR review)
#         ↓
#       ci  (tests, lint, SAST, SCA, SBOM, secret-scan)
#         ↓
#   build-push  (Docker build único, Trivy, DAST ZAP, push registry)
#         ↓
#   update-gitops  (actualiza gitops/values.yaml, crea PR GitOps)
#
# La fase CD (verify + rollback) vive en cd-verify.yml y se
# dispara cuando el PR de GitOps hace merge a main.
#
# COMPATIBILIDAD DE VERSIONES:
#   Node.js:   20.x LTS  — EOL Abril 2028
#   Trivy:     v0.56.1   — compatible con K8s 1.27-1.31
#   ZAP:       v0.12.0   — compatible con OWASP ZAP 2.15
#   Semgrep:   v1        — compatible con rules p/javascript, p/nodejs
#   GitLeaks:  v2        — Gitleaks 8.x
#   ArgoCD CLI: v2.13.3  — compatible con ArgoCD 2.x
#
# SEGURIDAD DE ACTIONS:
#   Las acciones están fijadas a versiones específicas.
#   Para pinning por SHA (máxima seguridad), ejecutar:
#     gh api /repos/{owner}/{repo}/git/ref/tags/{version}
#   y reemplazar la versión por el SHA completo del commit.
# ==============================================================

name: triggerci

on:
  push:
    branches:
      - main
    # IMPORTANTE: no disparar cuando ArgoCD/CI actualizan gitops/values.yaml
    # Eso evita el loop infinito CI → merge gitops PR → CI otra vez
    paths-ignore:
      - 'gitops/**'
      - '**.md'
  pull_request_review:
    types: [submitted]

# Denegar TODOS los permisos por defecto.
# Cada job declara explícitamente sólo lo que necesita.
# Principio de mínimo privilegio.
permissions: {}

env:
  APP_NAME: demo-app
  REGISTRY: docker.io
  IMAGE_REPO: nahumtestaccount/demo-app
  NODE_VERSION: "20"
  # Versión de Trivy — actualizar cuando se publique nueva versión
  # Verificar: https://github.com/aquasecurity/trivy/releases
  TRIVY_VERSION: "v0.69.3"
  # Versión de ArgoCD CLI — debe coincidir con la versión del servidor
  ARGOCD_CLI_VERSION: "v2.13.3"

# ==============================================================
# JOB 0: Validar que el PR fue aprobado
# Sólo corre en eventos pull_request_review
# ==============================================================
jobs:
  validate-pr-approval:
    name: Validate PR Approval
    if: github.event_name == 'pull_request_review'
    runs-on: ubuntu-latest
    # Este job no necesita ningún permiso
    permissions: {}
    steps:
      - name: Verify PR review is approved
        run: |
          echo "Review state: ${{ github.event.review.state }}"
          if [ "${{ github.event.review.state }}" != "approved" ]; then
            echo "❌ Este workflow sólo procede con review en estado 'approved'."
            exit 1
          fi
          echo "✅ PR aprobado — continuando pipeline"

# ==============================================================
# JOB 1: CI — Tests, Lint, SAST, SCA, SBOM, Secret scan
# ==============================================================
  ci:
    name: CI — Tests + Security Scanning
    runs-on: ubuntu-latest
    needs: [validate-pr-approval]
    # always(): corre aunque validate-pr-approval fue skipped (en push directo)
    # La segunda condición bloquea ejecución en PRs no aprobados
    if: |
      always() && (
        github.event_name == 'push' ||
        (
          github.event_name == 'pull_request_review' &&
          github.event.review.state == 'approved' &&
          needs.validate-pr-approval.result == 'success'
        )
      )
    permissions:
      contents: read          # Checkout del código
      security-events: write  # Subir SARIF a GitHub Code Scanning

    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}

    steps:
      # ── Checkout ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0   # Historial completo para GitLeaks y Semgrep diff
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Calcular image tag ─────────────────────────────────
      - name: Set image tag (SHA-short)
        id: vars
        run: |
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-12)
          echo "image_tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "Image tag será: ${SHORT_SHA}"

      # ── Node.js + dependencias ─────────────────────────────
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      # ── Tests con cobertura ────────────────────────────────
      - name: Run unit tests with coverage (≥80%)
        working-directory: app
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4.6.2
        if: always()
        with:
          name: coverage-report-${{ steps.vars.outputs.image_tag }}
          path: app/coverage/
          retention-days: 30

      # ── Lint ───────────────────────────────────────────────
      - name: Run ESLint
        working-directory: app
        run: npm run lint

      # ── Detección de secretos (BLOQUEA el pipeline) ────────
      # GitLeaks escanea todo el historial de commits.
      # Si encuentra un secreto → exit 1 → pipeline FALLA.
      # NO usar continue-on-error aquí: los secretos son bloqueantes.
      - name: GitLeaks — secret scanning
        uses: gitleaks/gitleaks-action@v2
        with:
          config-path: .gitleaks.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── SAST: Semgrep ──────────────────────────────────────
      # Corre en modo OSS: no requiere ningún secret.
      # Los rulesets p/javascript, p/nodejs, p/security-audit se
      # descargan directamente desde el registry público de Semgrep.
      # Si en el futuro quieres conectar Semgrep Cloud Platform:
      #   1. Crea el secret SEMGREP_APP_TOKEN en Settings → Secrets
      #   2. Agrega `env: SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}`
      #      al step (el warning desaparece cuando el secret existe en el repo)
      - name: Run Semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/javascript
            p/nodejs
            p/security-audit

      # ── SCA: npm audit ─────────────────────────────────────
      # --audit-level=critical: BLOQUEA sólo en vulnerabilidades CRITICAL.
      # HIGH se reporta pero no bloquea (se verá en el log).
      - name: npm audit (SCA — bloquear en CRITICAL)
        working-directory: app
        run: npm audit --audit-level=critical

      # ── SCA: Trivy filesystem ──────────────────────────────
      # Instalamos Trivy directamente con el script oficial de Aqua Security.
      # Esto es más fiable que depender de una GitHub Action de terceros cuya
      # versión puede ser inestable o no estar publicada en el marketplace.
      # Script: https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh
      - name: Install Trivy ${{ env.TRIVY_VERSION }}
        run: |
          TRIVY_VER="${{ env.TRIVY_VERSION }}"
          TRIVY_VER_NUM="${TRIVY_VER#v}"
          echo "Installing Trivy ${TRIVY_VER_NUM}..."
          wget -q "https://github.com/aquasecurity/trivy/releases/download/${TRIVY_VER}/trivy_${TRIVY_VER_NUM}_Linux-64bit.deb" \
            -O /tmp/trivy.deb
          sudo dpkg -i /tmp/trivy.deb
          rm /tmp/trivy.deb
          trivy --version

      # Paso 1: generar SARIF (para GitHub Code Scanning — no bloquea)
      - name: Trivy FS scan — generar SARIF
        run: |
          trivy fs \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0 \
            --format sarif \
            --output trivy-fs.sarif \
            --ignorefile .trivyignore \
            --skip-dirs app/node_modules,.git \
            .

      # Paso 2: scan bloqueante — sólo CRITICAL detiene el pipeline
      - name: Trivy FS scan — bloquear en CRITICAL
        run: |
          trivy fs \
            --severity CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            --ignorefile .trivyignore \
            --skip-dirs app/node_modules,.git \
            .

      - name: Upload Trivy FS SARIF a GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3.28.15
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-filesystem

      # ── SBOM: Software Bill of Materials ──────────────────
      # Genera inventario de dependencias en formato SPDX.
      # Requerido por EO 14028 y mejores prácticas supply-chain.
      - name: Generate SBOM (SPDX-JSON)
        run: |
          trivy fs \
            --format spdx-json \
            --output sbom-${{ steps.vars.outputs.image_tag }}.spdx.json \
            ./app

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: sbom-${{ steps.vars.outputs.image_tag }}
          path: sbom-${{ steps.vars.outputs.image_tag }}.spdx.json
          retention-days: 90   # 90 días para auditoría de compliance

      # ── Resumen en GitHub Actions Summary ─────────────────
      - name: CI Summary
        if: always()
        run: |
          echo "## CI Results — ${{ steps.vars.outputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests (≥80% coverage) | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| ESLint | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| GitLeaks (secret scan) | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Semgrep SAST | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| npm audit (CRITICAL) | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy FS (CRITICAL) | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| SBOM generado | ✅ |" >> $GITHUB_STEP_SUMMARY

# ==============================================================
# JOB 2: Build único + Trivy image scan + DAST + Push registry
# ==============================================================
  build-push:
    name: Build + DAST + Push
    runs-on: ubuntu-latest
    needs: [ci]
    if: needs.ci.result == 'success'
    permissions:
      contents: read
      packages: write         # Para push a GHCR si se migra allá
      security-events: write  # Para subir SARIF de imagen

    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
      full_image: ${{ steps.vars.outputs.full_image }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image vars
        id: vars
        run: |
          IMAGE_TAG=${{ needs.ci.outputs.image_tag }}
          FULL_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}:${IMAGE_TAG}"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "full_image=${FULL_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "Building: ${FULL_IMAGE}"

      # ── Docker setup ───────────────────────────────────────
      # QEMU: soporte de multi-arquitectura (arm64, amd64)
      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3.6.0

      # Buildx: builder avanzado con cache y multi-platform
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      # Login sólo en push a main (no en PRs)
      - name: Login to DockerHub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── BUILD ÚNICO ────────────────────────────────────────
      # PRINCIPIO: build once, deploy many.
      # La imagen que se testea con DAST ES la misma que se
      # deploya. El digest SHA256 es su identidad criptográfica.
      #
      # En PRs: push=false, load=true (disponible localmente)
      # En main: push=true (va al registry), load=true (para DAST)
      - name: Build Docker image
        id: build
        uses: docker/build-push-action@v6.15.0
        with:
          context: .
          # En main: push=true y también load=true para DAST
          # En PR: push=false, load=true
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          load: true
          # SÓLO tag SHA — nunca :latest en el registry
          # :latest es un tag mutable que no garantiza reproducibilidad
          tags: ${{ steps.vars.outputs.full_image }}
          # Cache: reutilizar layers entre runs del mismo branch
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Provenance y SBOM de imagen (supply chain security)
          provenance: true
          sbom: true

      # ── Trivy: scan de imagen ──────────────────────────────
      - name: Install Trivy ${{ env.TRIVY_VERSION }}
        run: |
          TRIVY_VER="${{ env.TRIVY_VERSION }}"
          TRIVY_VER_NUM="${TRIVY_VER#v}"
          echo "Installing Trivy ${TRIVY_VER_NUM}..."
          wget -q "https://github.com/aquasecurity/trivy/releases/download/${TRIVY_VER}/trivy_${TRIVY_VER_NUM}_Linux-64bit.deb" \
            -O /tmp/trivy.deb
          sudo dpkg -i /tmp/trivy.deb
          rm /tmp/trivy.deb
          trivy --version

      # Paso 1: SARIF para Code Scanning (no bloquea)
      - name: Trivy image scan — generar SARIF
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0 \
            --format sarif \
            --output trivy-image.sarif \
            --ignorefile .trivyignore \
            ${{ steps.vars.outputs.full_image }}

      # Paso 2: bloqueante en CRITICAL
      - name: Trivy image scan — bloquear en CRITICAL
        run: |
          trivy image \
            --severity CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            --ignorefile .trivyignore \
            ${{ steps.vars.outputs.full_image }}

      - name: Upload Trivy image SARIF a GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3.28.15
        if: always()
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

      # ── DAST: OWASP ZAP Baseline ───────────────────────────
      # Arrancar el contenedor con --network host para que
      # ZAP (que corre en su propio contenedor Docker) pueda
      # alcanzar la app vía host.docker.internal.
      - name: Start container for DAST (--network host)
        run: |
          docker run -d \
            --name demo-app \
            --network host \
            ${{ steps.vars.outputs.full_image }}

          echo "Esperando que la app esté lista..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "✅ App lista en intento ${i}"
              break
            fi
            if [ "${i}" -eq 30 ]; then
              echo "❌ App no respondió después de 60 segundos"
              docker logs demo-app
              exit 1
            fi
            echo "  Intento ${i}/30..."
            sleep 2
          done

          # Verificación final
          curl -f http://localhost:3000/health

      - name: OWASP ZAP Baseline Scan (DAST)
        uses: zaproxy/action-baseline@v0.12.0
        with:
          # host.docker.internal: ZAP (en Docker) alcanza el host
          # El action maneja --add-host=host.docker.internal:host-gateway
          # automáticamente en Linux runners
          target: 'http://host.docker.internal:3000'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'
        # ZAP baseline puede reportar findings sin ser bloqueante.
        # Para hacer ZAP bloqueante, cambiar a continue-on-error: false
        # y configurar correctamente el .zap/rules.tsv
        continue-on-error: true

      # Capturar logs del contenedor como artefacto de auditoría
      - name: Capture container logs (DAST)
        if: always()
        run: |
          docker logs demo-app > container-dast-logs.txt 2>&1 || true
          echo "=== Container inspect ===" >> container-dast-logs.txt
          docker inspect demo-app >> container-dast-logs.txt 2>&1 || true

      - name: Upload container DAST logs
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: dast-logs-${{ steps.vars.outputs.image_tag }}
          path: container-dast-logs.txt
          retention-days: 30

      # ── Resumen de Build en GitHub Actions Summary ─────────
      - name: Build Summary
        if: always()
        run: |
          echo "## Build Results — ${{ steps.vars.outputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Imagen:** \`${{ steps.vars.outputs.full_image }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy Image Scan (CRITICAL) | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| OWASP ZAP DAST | ⚠️ (ver reporte) |" >> $GITHUB_STEP_SUMMARY

# ==============================================================
# JOB 3: GitOps — actualizar values.yaml y crear PR
# Sólo corre en push a main (no en PRs)
# ==============================================================
  update-gitops:
    name: GitOps — Update image tag
    runs-on: ubuntu-latest
    needs: [ci, build-push]
    if: |
      needs.build-push.result == 'success' &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    permissions:
      contents: write       # Para commitear gitops/values.yaml
      pull-requests: write  # Para crear el PR de GitOps
      deployments: write    # Para crear GitHub Deployment status

    outputs:
      deployment_id: ${{ steps.gh-deployment.outputs.deployment_id }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Crear GitHub Deployment — visible en la pestaña "Deployments"
      # del repositorio. Permite rastrear qué versión está en qué ambiente.
      - name: Create GitHub Deployment
        id: gh-deployment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DEPLOYMENT_ID=$(gh api repos/${{ github.repository }}/deployments \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            --input - <<'PAYLOAD'
          {
            "ref": "${{ github.sha }}",
            "environment": "production",
            "description": "Deploy ${{ needs.ci.outputs.image_tag }}",
            "required_contexts": [],
            "auto_merge": false
          }
          PAYLOAD
          | jq -r '.id')

          echo "deployment_id=${DEPLOYMENT_ID}" >> "$GITHUB_OUTPUT"
          echo "GitHub Deployment ID: ${DEPLOYMENT_ID}"

      # Actualizar gitops/values.yaml con el nuevo tag de imagen
      - name: Update gitops/values.yaml
        run: |
          IMAGE_TAG="${{ needs.ci.outputs.image_tag }}"

          sed -i "s|tag: .*|tag: \"${IMAGE_TAG}\"|g" gitops/values.yaml
          sed -i "s|repository: .*|repository: \"${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}\"|g" gitops/values.yaml

          echo "=== gitops/values.yaml actualizado ==="
          cat gitops/values.yaml

      # Crear PR de GitOps con auto-merge habilitado.
      # REQUISITO: habilitar "Allow auto-merge" en Settings → General del repo.
      # Con branch protection activa, el PR se mergeará automáticamente
      # cuando todos los checks requeridos pasen.
      - name: Create GitOps PR (auto-merge)
        id: create-pr
        uses: peter-evans/create-pull-request@v7.0.8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "ci: update image tag to ${{ needs.ci.outputs.image_tag }}"
          title: "ci: update image tag to ${{ needs.ci.outputs.image_tag }}"
          body: |
            ## Automated GitOps Update

            | Campo | Valor |
            |-------|-------|
            | **Image tag** | `${{ needs.ci.outputs.image_tag }}` |
            | **Registry** | `${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}` |
            | **Commit source** | `${{ github.sha }}` |
            | **Triggered by** | ${{ github.actor }} |

            ### Qué cambia
            - `gitops/values.yaml`: `image.tag` actualizado a `${{ needs.ci.outputs.image_tag }}`

            ### Próximos pasos
            Al hacer merge de este PR, ArgoCD detectará el cambio y sincronizará
            el deployment en Kubernetes automáticamente.
            El workflow `cd-verify.yml` verificará el deploy y ejecutará smoke tests.

            ---
            *Generado automáticamente por triggerci.yml*
          branch: "ci/gitops-image-${{ needs.ci.outputs.image_tag }}"
          delete-branch: true
          base: main
          labels: "gitops,automation"
          add-paths: |
            gitops/values.yaml

      # Habilitar auto-merge en el PR recién creado.
      # Esto requiere que "Allow auto-merge" esté habilitado en el repo.
      - name: Enable auto-merge on GitOps PR
        if: steps.create-pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge \
            --auto \
            --squash \
            "${{ steps.create-pr.outputs.pull-request-number }}" \
            --repo "${{ github.repository }}" || \
          echo "⚠️ Auto-merge no se pudo habilitar — merge manual requerido"
          echo "PR #${{ steps.create-pr.outputs.pull-request-number }}: ${{ steps.create-pr.outputs.pull-request-url }}"

      - name: GitOps Summary
        run: |
          echo "## GitOps Update" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Imagen:** \`${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}:${{ needs.ci.outputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **PR GitOps:** ${{ steps.create-pr.outputs.pull-request-url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **GitHub Deployment ID:** ${{ steps.gh-deployment.outputs.deployment_id }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "ArgoCD sincronizará automáticamente cuando el PR sea mergeado." >> $GITHUB_STEP_SUMMARY
