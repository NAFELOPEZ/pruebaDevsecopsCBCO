apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: "https://github.com/NAFELOPEZ/pruebaDevsecopsCBCO.git"
    targetRevision: main
    path: helm/demo-app
    helm:
      valueFiles:
        - ../../gitops/values.yaml

  destination:
    server: "https://kubernetes.default.svc"
    namespace: demo-app

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true